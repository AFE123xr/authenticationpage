<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <h1>Create Account</h1>
    <form action="/register" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" autocomplete="username" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" autocomplete="email" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required><br><br>
        <label for="password_confirm">Confirm Password:</label>
        <input type="password" id="password_confirm" name="password_confirm" autocomplete="new-password" required><br><br>
        <button type="submit">Register</button>
    </form>
    <p><small>Password must be at least 12 characters with uppercase, lowercase, number, and special character.</small></p>
    <p>Already have an account? <a href="/">Login here</a></p>
</body>
</html>
